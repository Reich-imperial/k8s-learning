apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: dev
  name: fleet-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: fleet.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000